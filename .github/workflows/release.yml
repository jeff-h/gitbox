name: Build & Release

on:
  workflow_dispatch:
    branches: [release]
    inputs:
      version:
        description: 'Version number (e.g. 1.0.0)'
        required: true
        type: string

env:
  SCHEME: Gitbox
  CONFIGURATION: Release
  APP_NAME: Gitbox
  TEAM_ID: TQ7ARU352D

jobs:
  build-sign-release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build libgit2
        run: |
          cd libgit2
          mkdir -p build && cd build
          cmake .. -DBUILD_SHARED_LIBS=OFF -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build .

      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build archive
        run: |
          xcodebuild \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -archivePath "$RUNNER_TEMP/Gitbox.xcarchive" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual \
            archive

      - name: Export app
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/Gitbox.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist scripts/export-options.plist

      - name: Sign embedded git bundle binaries
        run: |
          APP_PATH="$RUNNER_TEMP/export/Gitbox.app"
          IDENTITY="Developer ID Application: Marmaladesoul Pty Ltd ($TEAM_ID)"
          RESOURCES="$APP_PATH/Contents/Resources"

          # Find the git bundle tar and extract it
          GIT_TAR=$(ls "$RESOURCES"/git.bundle-*.tar 2>/dev/null | head -1)
          if [ -n "$GIT_TAR" ]; then
            echo "Extracting $GIT_TAR"
            EXTRACT_DIR="$RUNNER_TEMP/git-bundle-extract"
            mkdir -p "$EXTRACT_DIR"
            tar -xf "$GIT_TAR" -C "$EXTRACT_DIR"

            # Build a map of inode → first-seen path for Mach-O files.
            # codesign replaces files, destroying hardlinks. We sign one
            # file per unique inode, then re-hardlink the rest afterwards.
            declare -A INODE_MAP
            HARDLINK_PAIRS=()

            while IFS= read -r binary; do
              if file "$binary" | grep -qE "Mach-O"; then
                inode=$(stat -f '%i' "$binary")
                if [ -z "${INODE_MAP[$inode]:-}" ]; then
                  # First time seeing this inode — sign it
                  INODE_MAP[$inode]="$binary"
                  echo "Signing: ${binary#$EXTRACT_DIR/}"
                  codesign --force --options runtime --timestamp --sign "$IDENTITY" "$binary"
                else
                  # Duplicate inode — record for re-hardlinking after signing
                  HARDLINK_PAIRS+=("${INODE_MAP[$inode]}|$binary")
                fi
              fi
            done < <(find "$EXTRACT_DIR" -type f)

            # Restore hardlinks (point duplicates back at the signed original)
            for pair in "${HARDLINK_PAIRS[@]}"; do
              src="${pair%%|*}"
              dst="${pair##*|}"
              rm "$dst"
              ln "$src" "$dst"
            done

            echo "Signed ${#INODE_MAP[@]} unique binaries, restored ${#HARDLINK_PAIRS[@]} hardlinks"

            # Re-tar the signed bundle (hardlinks preserved)
            echo "Re-creating tar with signed binaries"
            tar -cf "$GIT_TAR" -C "$EXTRACT_DIR" .
            rm -rf "$EXTRACT_DIR"
          fi

          # Sign any other Mach-O binaries directly in the app
          find "$APP_PATH" -type f \( -perm +111 -o -name "*.dylib" \) ! -name "*.tar" | while read -r binary; do
            if file "$binary" | grep -qE "Mach-O"; then
              echo "Signing: ${binary#$APP_PATH/}"
              codesign --force --options runtime --timestamp --sign "$IDENTITY" "$binary" 2>/dev/null || true
            fi
          done

          # Re-sign the main app bundle (top-level seal)
          codesign --force --deep --options runtime --timestamp --sign "$IDENTITY" "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH"
          echo "All binaries signed successfully"

      - name: Notarise
        env:
          API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_API_ISSUER_ID }}
          API_KEY_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY }}
        run: |
          # Write API key to expected location
          mkdir -p ~/private_keys
          echo "$API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${API_KEY_ID}.p8

          # Create zip for notarisation submission
          ditto -c -k --keepParent "$RUNNER_TEMP/export/Gitbox.app" "$RUNNER_TEMP/Gitbox-notarize.zip"

          # Submit and wait
          xcrun notarytool submit "$RUNNER_TEMP/Gitbox-notarize.zip" \
            --key ~/private_keys/AuthKey_${API_KEY_ID}.p8 \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait

          # Staple the ticket to the app
          xcrun stapler staple "$RUNNER_TEMP/export/Gitbox.app"

      - name: Create release zip
        run: |
          cd "$RUNNER_TEMP/export"
          ditto -c -k --keepParent Gitbox.app "Gitbox-${{ inputs.version }}.zip"

      - name: Generate Sparkle signature and appcast
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
        run: |
          ZIP_PATH="$RUNNER_TEMP/export/Gitbox-${{ inputs.version }}.zip"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version }}/Gitbox-${{ inputs.version }}.zip"

          # Generate EdDSA signature via stdin
          SIGN_OUTPUT=$(echo "$SPARKLE_KEY" | bin/sign_update --ed-key-file - "$ZIP_PATH" 2>&1) || true
          echo "sign_update output: $SIGN_OUTPUT"

          # Extract just the signature value from output like: sparkle:edSignature="xxx" length="yyy"
          SIGNATURE=$(echo "$SIGN_OUTPUT" | grep -o 'edSignature="[^"]*"' | sed 's/edSignature="//;s/"//')

          if [ -z "$SIGNATURE" ]; then
            echo "::warning::Could not generate Sparkle signature. Appcast will be missing edSignature."
            SIGNATURE="SIGNATURE_PLACEHOLDER"
          fi

          # Generate appcast XML
          scripts/generate-appcast-entry.sh \
            "${{ inputs.version }}" \
            "$ZIP_PATH" \
            "$DOWNLOAD_URL" \
            "$SIGNATURE" \
            > "$RUNNER_TEMP/export/appcast.xml"

          rm -f "$KEY_FILE"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "Gitbox ${{ inputs.version }}" \
            --generate-notes \
            "$RUNNER_TEMP/export/Gitbox-${{ inputs.version }}.zip" \
            "$RUNNER_TEMP/export/appcast.xml"

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true
